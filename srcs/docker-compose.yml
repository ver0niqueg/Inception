version: "3.8"

services:

  mariadb:
    image: mariadb:user
    container_name: mariadb
    build: ./requirements/mariadb
    volumes:
      - mariadb:/var/lib/mysql
    env_file:
      - .env
    networks:
      - inception
    restart: always
    healthcheck:
      test: ["CMD", "nc", "-zv", "mariadb", "3306"]
      intervals: 1s
      timeout: 5s
      retries: 10
  
  nginx:
    image: nginx:user
    container_name: mginx
    build: ./requirements/nginx
    ports:
      - "443:443"
    depends on:
      - wordpress
    volumes:
      - wordpress:/var/www/wordpress
    networks:
      - inception
    restart: always

  wordpress:
    image: wordpress:user
    container_name: wordpress
    build: ./requirements/wordpress
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - wordpress:/var/www/wordpress
    env_file:
      - .env
    networks:
      - inception
    restart: always

  volumes:
    mariadb:
      name: mariadb
      driver: local
      driver_opts:
        device: /home/data/mariadb
        o : bind
        type : none
    wordpress:
      name: wordpress
      driver: local
      driver_opts:
        device: /home/data/wordpress
        o : bind
        type : none

  networks:
    inception:
      name: inception